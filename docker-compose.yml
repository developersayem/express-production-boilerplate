version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: blb_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: blb_travel_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - blb_network

  prometheus:
    image: prom/prometheus:latest
    container_name: blb_prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - promdata:/prometheus
    ports:
      - "9090:9090"
    networks:
      - blb_network

  grafana:
    image: grafana/grafana:latest
    container_name: blb_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - "3001:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    networks:
      - blb_network
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:2.9.0
    container_name: blb_loki
    restart: always
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - lokidata:/loki
    networks:
      - blb_network

volumes:
  pgdata:
  promdata:
  grafanadata:
  lokidata:

networks:
  blb_network:
    driver: bridge
